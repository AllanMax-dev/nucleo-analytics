services:
  postgres:
    image: postgres:16
    container_name: nucleo_analytics_postgres
    environment:
      POSTGRES_DB: nucleo_analytics
      POSTGRES_USER: nucleo_user
      POSTGRES_PASSWORD: nucleo_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
